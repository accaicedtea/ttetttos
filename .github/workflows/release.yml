name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn clean package -B -DskipTests

      - name: Offusca JAR (ProGuard)
        run: |
          PG_VER="7.5.0"
          PG_JAR="proguard-base-${PG_VER}.jar"
          PG_URL="https://repo1.maven.org/maven2/com/guardsquare/proguard-base/${PG_VER}/${PG_JAR}"
          curl -fL "$PG_URL" -o "$PG_JAR"
          java -jar "$PG_JAR" @proguard.pro
          mv target/demo-1-obf.jar target/demo-1.jar
          ls -lh target/demo-1.jar

      - name: Verifica artifact
        run: ls -lh target/demo-1.jar target/lib.tar.gz

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          files: |
            target/demo-1.jar
            target/lib.tar.gz
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}