name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn clean package -B -DskipTests

      - name: Offusca JAR (ProGuard)
        run: |
          PG_VER="7.5.0"

          # proguard-base = libreria (no main)
          # proguard-core = dipendenza
          # Scarica entrambi e li mettiamo nel classpath
          BASE_URL="https://repo1.maven.org/maven2/com/guardsquare"

          curl -fL "${BASE_URL}/proguard-base/${PG_VER}/proguard-base-${PG_VER}.jar" \
               -o proguard-base.jar
          curl -fL "${BASE_URL}/proguard-core/9.1.6/proguard-core-9.1.6.jar" \
               -o proguard-core.jar

          echo "Eseguo ProGuard..."
          java -cp "proguard-base.jar:proguard-core.jar" \
               proguard.ProGuard \
               @proguard.pro

          mv target/demo-1-obf.jar target/demo-1.jar
          echo "Offuscamento completato."
          ls -lh target/demo-1.jar

      - name: Verifica artifact
        run: ls -lh target/demo-1.jar target/lib.tar.gz

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          files: |
            target/demo-1.jar
            target/lib.tar.gz
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}