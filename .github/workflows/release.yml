name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn clean package -B -DskipTests

      - name: Offusca JAR (ProGuard)
        run: |
          MAVEN="https://repo1.maven.org/maven2"
          PG="com/guardsquare"
          LOG4J="org/apache/logging/log4j"

          # Scarica ProGuard + tutte le sue dipendenze
          curl -fL "${MAVEN}/${PG}/proguard-base/7.5.0/proguard-base-7.5.0.jar"         -o pg-base.jar
          curl -fL "${MAVEN}/${PG}/proguard-core/9.1.6/proguard-core-9.1.6.jar"         -o pg-core.jar
          curl -fL "${MAVEN}/${LOG4J}/log4j-api/2.23.1/log4j-api-2.23.1.jar"            -o log4j-api.jar
          curl -fL "${MAVEN}/${LOG4J}/log4j-core/2.23.1/log4j-core-2.23.1.jar"          -o log4j-core.jar
          curl -fL "${MAVEN}/${LOG4J}/log4j-slf4j2-impl/2.23.1/log4j-slf4j2-impl-2.23.1.jar" -o log4j-slf4j.jar
          curl -fL "${MAVEN}/org/slf4j/slf4j-api/2.0.13/slf4j-api-2.0.13.jar"           -o slf4j-api.jar

          CP="pg-base.jar:pg-core.jar:log4j-api.jar:log4j-core.jar:log4j-slf4j.jar:slf4j-api.jar"

          echo "Eseguo ProGuard..."
          java -cp "$CP" proguard.ProGuard @proguard.pro

          mv target/demo-1-obf.jar target/demo-1.jar
          echo "Offuscamento completato."
          ls -lh target/demo-1.jar

      - name: Verifica artifact
        run: ls -lh target/demo-1.jar target/lib.tar.gz

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          files: |
            target/demo-1.jar
            target/lib.tar.gz
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}