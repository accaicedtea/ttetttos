<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    display: flex;
    height: 100%;
  }

  .scene {
    display: flex;
    width: 100%;
    min-height: 520px;
    background: #f0f0f0;
    border-radius: 16px;
    align-items: center;
    justify-content: space-between;
    padding: 40px 48px;
  }

  .left-area {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 16px;
    width: 60%;
  }

  .box {
    border-radius: 22px;
    background: #f0f0f0;
    display: flex;
    flex-direction: row;
    overflow: hidden;
    width: 260px;
    height: 330px;
    box-shadow: 12px 12px 20px #bbbbbb, -8px -8px 16px #ffffff;
    transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1), height 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .img-side {
    flex: 0 0 425px;
    height: 100%;
    position: relative;
    overflow: hidden;
    transition: flex-basis 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .img-side img {
    width: 360px;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.5s ease;
  }

  .img-side img.fade {
    opacity: 0;
  }

  .content-side {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 24px;
    opacity: 0;
    transform: translateX(16px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    min-width: 0;
    pointer-events: none;
  }

  .content-side.show {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
  }

  .content-side h2 {
    font-size: 1rem;
    font-weight: 500;
    color: #444;
    margin-bottom: 14px;
    white-space: nowrap;
  }

  .inner-card {
    background: #f0f0f0;
    border-radius: 14px;
    padding: 11px 14px;
    margin-bottom: 10px;
    box-shadow: 4px 4px 8px #cccccc, -4px -4px 8px #ffffff;
  }

  .inner-card:last-child {
    margin-bottom: 0;
  }

  .inner-card h3 {
    font-size: 0.78rem;
    font-weight: 500;
    color: #555;
    margin-bottom: 3px;
  }

  .inner-card p {
    font-size: 0.73rem;
    color: #888;
    line-height: 1.45;
  }

  .dots {
    display: flex;
    gap: 7px;
    padding-left: 4px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ccc;
    transition: background 0.3s, transform 0.2s;
  }

  .dot.active {
    background: #777;
    transform: scale(1.25);
  }

  .right-area {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 40%;
  }

  .right-area h1 {
    font-size: 2rem;
    font-weight: 500;
    color: #777;
    letter-spacing: 0.04em;
  }
</style>

<style>
  .carousel {
    width: min(1200px, 90vw);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 50px;
    margin: 0 auto;
  }

  .slider {
    width: var(--width);
    height: 100%;
    overflow: hidden;
    mask-image: linear-gradient(to bottom,
        transparent,
        #000 10% 90%,
        transparent);
  }

  .slider .list {
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: calc(var(--height) * var(--quantity));
    position: relative;
  }

  .slider .list .item {
    width: var(--width);
    height: var(--height);
    position: absolute;
    top: 100%;
    animation: autoRun 60s linear infinite;
    transition: filter 0.5s;
    animation-delay: calc((60s / var(--quantity)) * (var(--position) - 1) - 60s) !important;
  }

  .slider .list .item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
  }

  @keyframes autoRun {
    from {
      top: 100%;
    }

    to {
      top: calc(var(--height) * -1);
    }
  }
</style>

<body>

  <div class="scene">
    <div class="left-area">
      <div class="box" id="box">
        <div class="img-side" id="imgSide">

    <div class="right-area">

          <div class="list">

<script>
  const slides = [
    { seed: 'nature', title: 'Natura e Paesaggi', d1t: 'Foreste', d1p: 'Ecosistemi ricchi di biodiversità e vita selvatica.', d2t: 'Oceani', d2p: 'Coprono il 71% della superficie terrestre.' },
    { seed: 'city', title: 'Vita Urbana', d1t: 'Architettura', d1p: 'Strutture che definiscono il carattere delle città.', d2t: 'Cultura', d2p: 'Arte, musica e tradizioni che uniscono le persone.' },
    { seed: 'tech', title: 'Tecnologia', d1t: 'Innovazione', d1p: 'Nuove soluzioni per i problemi di domani.', d2t: 'Connettività', d2p: 'Il mondo sempre più vicino e interconnesso.' },
    { seed: 'food', title: 'Cucina', d1t: 'Sapori', d1p: 'Ingredienti unici da ogni angolo del pianeta.', d2t: 'Tradizione', d2p: 'Ricette tramandate di generazione in generazione.' },
  ];

  let current = 0;
  const box = document.getElementById('box');
  const imgSide = document.getElementById('imgSide');
  const contentSide = document.getElementById('contentSide');
  const slideImg = document.getElementById('slideImg');
  const dotsEl = document.getElementById('dots');

  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(d);
  });

  function updateDots() {
    [...dotsEl.children].forEach((d, i) => d.className = 'dot' + (i === current ? ' active' : ''));
  }

  function fillContent(s) {
    document.getElementById('slideTitle').textContent = s.title;
    document.getElementById('d1t').textContent = s.d1t;
    document.getElementById('d1p').textContent = s.d1p;
    document.getElementById('d2t').textContent = s.d2t;
    document.getElementById('d2p').textContent = s.d2p;
  }

  function expand() {
    fillContent(slides[current]);
    box.style.width = '700px';
    box.style.height = '425px';
    imgSide.style.flexBasis = '425px';
    setTimeout(() => { contentSide.classList.add('show'); }, 550);
  }

  function collapse() {
    contentSide.classList.remove('show');
    setTimeout(() => {
      box.style.width = '260px';
      box.style.height = '330px';
      imgSide.style.flexBasis = '330px';
    }, 300);
  }

  function nextSlide() {
    slideImg.style.transition = 'opacity 0.5s ease, filter 0.5s ease';
    slideImg.classList.add('fade');
    slideImg.style.filter = 'blur(10px)';

    setTimeout(() => {
      current = (current + 1) % slides.length;
      slideImg.src = `https://picsum.photos/seed/${slides[current].seed}/520/520`;
      updateDots();

      slideImg.onload = () => {
        slideImg.classList.remove('fade');
        slideImg.style.filter = 'blur(0)';
      };

      setTimeout(() => {
        slideImg.classList.remove('fade');
        slideImg.style.filter = 'blur(0)';
      }, 100);
    }, 500);
  }

  function cycle() {
    expand();
    setTimeout(() => {
      collapse();
      setTimeout(() => {
        nextSlide();
        setTimeout(cycle, 5000);
      }, 750);
    }, 8000);// 8sec expanded, 750ms collapse, 500ms fade, then next cycle after 5sec
  }

  fillContent(slides[0]);
  updateDots();
  setTimeout(cycle, 5000);
</script>
